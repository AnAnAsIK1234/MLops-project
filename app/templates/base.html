<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | ML Cabinet</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-row">
            <div class="logo">
                <a href="/">ML Cabinet</a>
            </div>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/balance-page">Balance</a>
                <a href="/predict-page">Predict</a>
                <a href="/history-page">History</a>
                <a href="/login" id="loginLink">Login</a>
                <a href="/register" id="registerLink">Register</a>
                <a href="#" id="logoutLink" style="display:none;">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        function getToken() {
            return localStorage.getItem("access_token");
        }

        function setToken(token) {
            localStorage.setItem("access_token", token);
        }

        function clearToken() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("current_user");
        }

        function isAuthenticated() {
            return !!getToken();
        }

        async function apiRequest(url, options = {}) {
            const token = getToken();
            const headers = {
                ...(options.headers || {})
            };

            if (token) {
                headers["Authorization"] = `Bearer ${token}`;
            }

            const response = await fetch(url, {
                ...options,
                headers
            });

            let data = null;
            const contentType = response.headers.get("content-type") || "";
            if (contentType.includes("application/json")) {
                data = await response.json();
            } else {
                data = await response.text();
            }

            if (!response.ok) {
                const message = typeof data === "object" && data?.detail
                    ? data.detail
                    : "Request error";
                throw new Error(message);
            }

            return data;
        }

        async function loadCurrentUser() {
            if (!isAuthenticated()) {
                return null;
            }

            try {
                const user = await apiRequest("/auth/me");
                localStorage.setItem("current_user", JSON.stringify(user));
                return user;
            } catch (error) {
                clearToken();
                return null;
            }
        }

        function requireAuth() {
            if (!isAuthenticated()) {
                window.location.href = "/login";
            }
        }

        function updateNav() {
            const loginLink = document.getElementById("loginLink");
            const registerLink = document.getElementById("registerLink");
            const logoutLink = document.getElementById("logoutLink");

            if (isAuthenticated()) {
                if (loginLink) loginLink.style.display = "none";
                if (registerLink) registerLink.style.display = "none";
                if (logoutLink) logoutLink.style.display = "inline-block";
            } else {
                if (loginLink) loginLink.style.display = "inline-block";
                if (registerLink) registerLink.style.display = "inline-block";
                if (logoutLink) logoutLink.style.display = "none";
            }

            if (logoutLink) {
                logoutLink.onclick = function (e) {
                    e.preventDefault();
                    clearToken();
                    window.location.href = "/login";
                };
            }
        }

        function showMessage(containerId, text, type = "info") {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.className = `message ${type}`;
            el.textContent = text;
        }

        function clearMessage(containerId) {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.className = "message";
            el.textContent = "";
        }

        document.addEventListener("DOMContentLoaded", async () => {
            updateNav();
            await loadCurrentUser();
            updateNav();
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
