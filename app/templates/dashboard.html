{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Dashboard</h1>

    <div id="dashboardMessage" class="message"></div>

    <div class="card-grid">
        <div class="card">
            <h3>User</h3>
            <p><strong>Login:</strong> <span id="userLogin">-</span></p>
            <p><strong>Role:</strong> <span id="userRole">-</span></p>
            <p><strong>Status:</strong> <span id="userStatus">-</span></p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p class="balance-value"><span id="userBalance">0</span> credits</p>
            <a class="btn" href="/balance-page">Open balance page</a>
        </div>
    </div>

    <div class="actions">
        <a class="btn" href="/predict-page">Send ML request</a>
        <a class="btn btn-secondary" href="/history-page">View history</a>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        requireAuth();

        try {
            const user = await apiRequest("/auth/me");
            document.getElementById("userLogin").textContent = user.login;
            document.getElementById("userRole").textContent = user.role;
            document.getElementById("userStatus").textContent = user.is_active ? "active" : "inactive";

            const balance = await apiRequest("/balance");
            document.getElementById("userBalance").textContent = balance.credits;
        } catch (error) {
            showMessage("dashboardMessage", error.message, "error");
        }
    });
</script>
{% endblock %}
