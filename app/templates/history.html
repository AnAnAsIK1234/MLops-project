{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>История операций</h1>

    <div id="historyMessage" class="message"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Тип операции</th>
                    <th>Статус</th>
                    <th>Сумма</th>
                    <th>Описание</th>
                    <th>Task ID</th>
                    <th>Модель</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr><td colspan="7">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="panel-inner">
        <h2>История ML-задач</h2>
        <pre id="predictionHistoryBox" class="code-box"></pre>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    async function loadHistoryPage() {
        const history = await apiRequest("/history/");
        const predictionHistory = await apiRequest("/history/predictions");

        const tbody = document.getElementById("historyTable");
        if (!history.length) {
            tbody.innerHTML = '<tr><td colspan="7">История пока пуста</td></tr>';
        } else {
            tbody.innerHTML = history.map(item => `
                <tr>
                    <td>${item.created_at}</td>
                    <td>${item.operation_type}</td>
                    <td>${item.status}</td>
                    <td>${item.amount}</td>
                    <td>${item.description}</td>
                    <td>${item.task_id ?? "-"}</td>
                    <td>${item.model_name ?? "-"}</td>
                </tr>
            `).join("");
        }

        document.getElementById("predictionHistoryBox").textContent =
            JSON.stringify(predictionHistory, null, 2);
    }

    document.addEventListener("DOMContentLoaded", async () => {
        requireAuth();
        try {
            await loadHistoryPage();
        } catch (error) {
            showMessage("historyMessage", error.message, "error");
        }
    });
</script>
{% endblock %}
