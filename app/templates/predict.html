{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>LLM Request</h1>

    <div id="predictMessage" class="message"></div>

    <div class="card-grid">
        <div class="card">
            <h3>Manual prompt</h3>

            <form id="predictForm" class="form">
                <label>
                    Model
                    <select id="formModelId" required></select>
                </label>

                <label>
                    Prompt
                    <textarea id="prompt" rows="8" required placeholder="Write your prompt here..."></textarea>
                </label>

                <button type="submit" class="btn">Send prompt</button>
            </form>
        </div>

        <div class="card">
            <h3>CSV upload</h3>

            <form id="filePredictForm" class="form">
                <label>
                    Model
                    <select id="fileModelId" required></select>
                </label>

                <label>
                    CSV file
                    <input type="file" id="csvFile" accept=".csv" required>
                </label>

                <p class="muted">CSV format: one column named <code>prompt</code></p>

                <button type="submit" class="btn">Submit file</button>
            </form>
        </div>
    </div>

    <div class="panel-inner">
        <h2>Latest result</h2>
        <div id="taskInfo" class="muted">No task submitted yet.</div>
        <pre id="resultBox" class="code-box"></pre>
    </div>

    <div class="panel-inner">
        <h2>Validation errors</h2>
        <pre id="validationBox" class="code-box"></pre>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let latestTaskId = null;

    async function loadModels() {
        const models = await apiRequest("/models/");
        const formSelect = document.getElementById("formModelId");
        const fileSelect = document.getElementById("fileModelId");

        const options = models.map(model =>
            `<option value="${model.id}">${model.name} | ${model.price_per_request} credits</option>`
        ).join("");

        formSelect.innerHTML = options;
        fileSelect.innerHTML = options;
    }

    async function pollTask(taskId) {
        latestTaskId = taskId;
        const taskInfo = document.getElementById("taskInfo");
        const resultBox = document.getElementById("resultBox");

        const intervalId = setInterval(async () => {
            try {
                const data = await apiRequest(`/predict/${taskId}`);
                taskInfo.textContent =
                    `task_id=${data.task_id}, status=${data.status}, processed=${data.processed_count}, rejected=${data.rejected_count}, charged=${data.charged_credits}`;

                resultBox.textContent = JSON.stringify(data, null, 2);

                if (data.status === "success" || data.status === "failed") {
                    clearInterval(intervalId);
                }
            } catch (error) {
                clearInterval(intervalId);
                showMessage("predictMessage", error.message, "error");
            }
        }, 1500);
    }

    document.getElementById("predictForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage("predictMessage");
        document.getElementById("validationBox").textContent = "";

        try {
            const payload = {
                model_id: document.getElementById("formModelId").value,
                prompt: document.getElementById("prompt").value
            };

            const response = await apiRequest("/predict/form", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            showMessage("predictMessage", "Task has been sent to the queue.", "success");
            document.getElementById("taskInfo").textContent =
                `task_id=${response.task_id}, status=${response.status}, processed=${response.processed_count}, rejected=${response.rejected_count}`;

            await pollTask(response.task_id);
        } catch (error) {
            showMessage("predictMessage", error.message, "error");
        }
    });

    document.getElementById("filePredictForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage("predictMessage");

        const fileInput = document.getElementById("csvFile");
        const file = fileInput.files[0];
        if (!file) {
            showMessage("predictMessage", "Please choose a CSV file.", "error");
            return;
        }

        try {
            const formData = new FormData();
            formData.append("model_id", document.getElementById("fileModelId").value);
            formData.append("file", file);

            const response = await apiRequest("/predict/file", {
                method: "POST",
                body: formData
            });

            document.getElementById("validationBox").textContent =
                JSON.stringify(response.validation_errors || [], null, 2);

            showMessage("predictMessage", "File accepted and task sent to the queue.", "success");
            document.getElementById("taskInfo").textContent =
                `task_id=${response.task_id}, status=${response.status}, processed=${response.processed_count}, rejected=${response.rejected_count}`;

            await pollTask(response.task_id);
        } catch (error) {
            showMessage("predictMessage", error.message, "error");
        }
    });

    document.addEventListener("DOMContentLoaded", async () => {
        requireAuth();
        try {
            await loadModels();
        } catch (error) {
            showMessage("predictMessage", error.message, "error");
        }
    });
</script>
{% endblock %}
