{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Баланс</h1>

    <div id="balanceMessage" class="message"></div>

    <div class="card-grid">
        <div class="card">
            <h3>Текущий баланс</h3>
            <p class="balance-value"><span id="balanceValue">0</span> кредитов</p>
        </div>

        <div class="card">
            <h3>Пополнение</h3>

            <div class="actions">
                <button class="btn" onclick="topUpQuick(10)">+10</button>
                <button class="btn" onclick="topUpQuick(50)">+50</button>
                <button class="btn" onclick="topUpQuick(100)">+100</button>
            </div>

            <form id="topUpForm" class="form inline-form">
                <label>
                    Сумма
                    <input type="number" id="topUpAmount" min="1" value="10" required>
                </label>
                <button type="submit" class="btn">Пополнить</button>
            </form>
        </div>
    </div>

    <div class="table-wrap">
        <h2>Транзакции</h2>
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Тип</th>
                    <th>Сумма</th>
                    <th>Описание</th>
                </tr>
            </thead>
            <tbody id="transactionsTable">
                <tr><td colspan="4">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    async function loadBalancePage() {
        const balance = await apiRequest("/balance");
        document.getElementById("balanceValue").textContent = balance.credits;

        const transactions = await apiRequest("/balance/transactions");
        const tbody = document.getElementById("transactionsTable");

        if (!transactions.length) {
            tbody.innerHTML = '<tr><td colspan="4">Транзакций пока нет</td></tr>';
            return;
        }

        tbody.innerHTML = transactions.map(item => `
            <tr>
                <td>${item.created_at}</td>
                <td>${item.transaction_type}</td>
                <td>${item.amount}</td>
                <td>${item.description}</td>
            </tr>
        `).join("");
    }

    async function topUpQuick(amount) {
        clearMessage("balanceMessage");
        try {
            await apiRequest("/balance/top-up", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount })
            });
            showMessage("balanceMessage", `Баланс пополнен на ${amount}`, "success");
            await loadBalancePage();
        } catch (error) {
            showMessage("balanceMessage", error.message, "error");
        }
    }

    document.getElementById("topUpForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage("balanceMessage");

        const amount = Number(document.getElementById("topUpAmount").value);

        try {
            await apiRequest("/balance/top-up", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount })
            });
            showMessage("balanceMessage", `Баланс пополнен на ${amount}`, "success");
            await loadBalancePage();
        } catch (error) {
            showMessage("balanceMessage", error.message, "error");
        }
    });

    document.addEventListener("DOMContentLoaded", async () => {
        requireAuth();
        try {
            await loadBalancePage();
        } catch (error) {
            showMessage("balanceMessage", error.message, "error");
        }
    });
</script>
{% endblock %}
