services:
  api:
    build: ./app
    env_file:
      - ./app/.env
    working_dir: /app
    volumes:
      - ./app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
      - database

  worker-1:
    build: ./app
    env_file:
      - ./app/.env
    working_dir: /app
    volumes:
      - ./app:/app
    command: python -m src.worker
    environment:
      WORKER_ID: worker-1
    depends_on:
      - rabbitmq
      - database

  worker-2:
    build: ./app
    env_file:
      - ./app/.env
    working_dir: /app
    volumes:
      - ./app:/app
    command: python -m src.worker
    environment:
      WORKER_ID: worker-2
    depends_on:
      - rabbitmq
      - database

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  database:
    image: postgres:16-alpine
    env_file:
      - ./app/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  rabbitmq_data:
  postgres_data: