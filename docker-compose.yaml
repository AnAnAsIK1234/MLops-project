services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - ./app/.env
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command:
      - -c
      - ollama pull "$$OLLAMA_MODEL"
    restart: "no"

  api:
    build: ./app
    env_file:
      - ./app/.env
    working_dir: /app
    volumes:
      - ./app:/app
      - ./tests:/app/tests
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  worker-1:
    build: ./app
    env_file:
      - ./app/.env
    working_dir: /app
    volumes:
      - ./app:/app
    command: python -m src.worker
    environment:
      WORKER_ID: worker-1
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  worker-2:
    build: ./app
    env_file:
      - ./app/.env
    working_dir: /app
    volumes:
      - ./app:/app
    command: python -m src.worker
    environment:
      WORKER_ID: worker-2
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  database:
    image: postgres:16-alpine
    env_file:
      - ./app/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  rabbitmq_data:
  postgres_data:
  ollama_data: