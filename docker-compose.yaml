version: "3"

services:
  app:
    build: ./app
    env_file:
      - ./app/.env
    volumes:
      - ./app/src:/app/src
    working_dir: /app
    command: python /app/src/app.py
    expose:
      - "8000"
    depends_on:
      - database
      - rabbitmq
    restart: unless-stopped

  web-proxy:
    build: ./web-proxy
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    env_file:
      - ./app/.env
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
